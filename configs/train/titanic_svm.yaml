run_name: run_titanic_svm
seed: 42
paths:
  data_config: configs/data/titanic_bakeoff.yaml
  feature_config: configs/features/titanic_all_features.yaml
  model_config: configs/models/titanic_svm.yaml
  runs_dir: runs
artifacts:
  model_file: model.joblib
  metrics_file: metrics.json
  params_file: params.json
  predictions_file: predictions.csv
cross_validation:
  enabled: true
  folds: 5
  scoring: roc_auc
